name: Tests and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  swift-tests:
    name: Swift tests
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

  release-build:
    name: Build release app
    runs-on: macos-14
    needs: swift-tests
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build app bundle
        run: scripts/install_app.sh --target "$PWD/dist" --no-open

      - name: Package app bundle
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "YESSS Quota Tray.app" "../YESSS-Quota-Tray-${GITHUB_REF_NAME}-macos.zip"

      - name: Publish GitHub release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset="YESSS-Quota-Tray-${GITHUB_REF_NAME}-macos.zip"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$asset" --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              "$asset" \
              --title "YESSS Quota Tray ${GITHUB_REF_NAME}" \
              --notes "Prebuilt macOS app bundle for YESSS Quota Tray." \
              --verify-tag
          fi
